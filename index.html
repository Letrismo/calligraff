<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
  <meta name="description" content="Demo Pilot de eQuills: una brocha generativa con suavizado organico y gradientes editables." />
  <meta name="application-name" content="eQuills Pilot" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="eQuills Pilot" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#0d0d0d" />
  <meta property="og:title" content="eQuills / Pilot" />
  <meta property="og:description" content="Brocha generativa con procesamiento de curvas, simplificacion de linea y paletas de color." />
  <title>eQuills / Pilot</title>
  <link rel="manifest" href="./manifest.webmanifest" />
  <link rel="icon" href="./icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="./pilot.png" />
  <link rel="stylesheet" href="./css/style.css" />
</head>
<body>
  <main class="app-shell" aria-label="eQuills Pilot">
    <section class="canvas-stage" aria-label="Lienzo de dibujo">
      <div id="app" class="canvas-mount"></div>
    </section>
    <div class="app-actions" aria-label="Acciones del lienzo">
      <button class="action-button action-button--icon" type="button" data-action="fullscreen" aria-label="Pantalla completa" title="Pantalla completa"></button>
      <button class="action-button" type="button" data-action="erase">Erase</button>
    </div>
    <output id="pressure-readout" class="pressure-readout" aria-live="polite">Pressure -</output>
  </main>
  <noscript>Activa JavaScript para usar la demo interactiva de eQuills.</noscript>
  <!-- Runtime libraries -->
  <script defer src="https://cdn.jsdelivr.net/npm/p5@1.9.4/lib/p5.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/lil-gui@0.19.2/dist/lil-gui.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/pressure@2.2.0/dist/pressure.min.js"></script>
  <!-- eQuills runtime -->
  <script defer src="./config.js"></script>
  <script defer src="./core/PressureInput.js"></script>
  <script defer src="./core/Sample.js"></script>
  <script defer src="./core/Stroke.js"></script>
  <script defer src="./core/PathProcessing.js"></script>
  <script defer src="./core/EQuill.js"></script>
  <script defer src="./core/PointerInput.js"></script>
  <script defer src="./renderers/CircleStampRenderer.js"></script>
  <script defer src="./brushes/Pilot.js"></script>
  <script defer src="./ui-actions.js"></script>
  <script defer src="./sketch.js"></script>
</body>
</html>
